<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../../src/assets/images/naruto-br-api.png" type="image/png">

    <title>Novo Personagem - Naruto BR API</title>

    <script src="https://cdn.jsdelivr.net/npm/vue@3.5.13/dist/vue.global.prod.js"></script>
    <script defer src="../../src/web-components/navbar-component.js"></script>
    <link href="../../src/assets/output.css" rel="stylesheet">
  </head>

  <body class="bg-gray-300">
    <div id="app">
      <navbar-component ref="navbar" @logout="logout"></navbar-component>
      <section class="flex flex-col items-center w-full">
        <h1 class="text-2xl text-center mt-2 mb-4">Novo Personagem</h1>

        <form @submit.prevent="createCharacter" class="flex justify-center gap-4 flex-wrap w-8/12">

          <div class="w-[49%] flex flex-col">
            <label for="name">Nome do Personagem:</label>
            <input type="text" v-model="name" id="name" required>
          </div>

          <div class="w-[49%] flex flex-col">
            <label for="village">Vila:</label>
            <input type="text" v-model="village" id="village" required>
          </div>

          <div class="w-[25%] flex flex-col">
            <label for="rank">Rank:</label>
            <input type="text" v-model="rank" id="rank" required>
          </div>

          <div class="w-[24%] flex flex-col">
            <label for="power">Nível de Poder:</label>
            <input type="number" v-model="power" id="power" required>
          </div>

          <div class="w-[47%] flex flex-col">
            <label for="image">Imagem de Perfil:</label>
            <input type="text" v-model="profile_image" id="image" required>
          </div>

          <div class="w-[100%] flex flex-col">
            <label for="summary">Resumo:</label>
            <textarea v-model="summary" id="summary" required></textarea>
          </div>

          <button type="submit" class="bg-orange-500 hover:bg-orange-600
            text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline"
          >
            Criar Personagem
          </button>
        </form>
      </section>
    <script src="../../src/guard.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
